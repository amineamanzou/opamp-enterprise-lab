# Sanitized OpenTelemetry Collector template for the Bindplane scenario.
#
# Prefer a Bindplane-exported/generated config during live testing. Use this
# file only as the lab's portable baseline and redact any generated auth values
# before copying evidence into Git.

extensions:
  health_check:
    endpoint: ${env:OTEL_HEALTH_CHECK_ENDPOINT}
  opamp:
    server:
      http:
        endpoint: ${env:BINDPLANE_OPAMP_ENDPOINT}
        headers: ${env:BINDPLANE_OPAMP_HEADERS}

receivers:
  filelog:
    include: ["${env:LOG_FILE_PATHS}"]
    start_at: end
    include_file_path: true
    include_file_name: true
  otlp:
    protocols:
      grpc:
        endpoint: ${env:OTEL_OTLP_GRPC_ENDPOINT}
      http:
        endpoint: ${env:OTEL_OTLP_HTTP_ENDPOINT}

processors:
  resource/lab:
    attributes:
      - key: service.name
        value: ${env:SERVICE_NAME}
        action: upsert
      - key: service.instance.id
        value: ${env:SERVICE_INSTANCE_ID}
        action: upsert
      - key: host.name
        value: ${env:HOST_NAME}
        action: upsert
      - key: deployment.environment
        value: ${env:DEPLOYMENT_ENVIRONMENT}
        action: upsert
      - key: fleet.scenario.name
        value: bindplane-otel
        action: upsert
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  otlphttp/elastic:
    endpoint: ${env:ELASTIC_OTLP_ENDPOINT}
    headers:
      Authorization: ApiKey ${env:ELASTIC_API_KEY}

service:
  extensions: [health_check, opamp]
  pipelines:
    logs:
      receivers: [filelog, otlp]
      processors: [resource/lab, batch]
      exporters: [otlphttp/elastic]
  telemetry:
    logs:
      level: info
    metrics:
      address: ${env:OTEL_INTERNAL_METRICS_ENDPOINT}
