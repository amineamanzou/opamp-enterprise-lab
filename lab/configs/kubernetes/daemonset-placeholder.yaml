apiVersion: v1
kind: Namespace
metadata:
  name: opamp-logs-poc
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otelcol-logs-min-config
  namespace: opamp-logs-poc
data:
  collector.yaml: |
    # Replace with lab/configs/collector/logs-min-elastic.yaml after adapting env var delivery.
    receivers: {}
    processors: {}
    exporters: {}
    service:
      pipelines: {}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otelcol-logs-min
  namespace: opamp-logs-poc
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: otelcol-logs-min
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otelcol-logs-min
    spec:
      serviceAccountName: otelcol-logs-min
      containers:
        - name: otelcol
          image: REPLACE_WITH_OCB_IMAGE
          args: ["--config=/etc/otelcol/collector.yaml"]
          env:
            - name: ELASTIC_OTLP_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: elastic-otlp
                  key: endpoint
            - name: ELASTIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: elastic-otlp
                  key: api-key
            - name: LOG_FILE_PATHS
              value: /var/log/containers/*.log
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
            - name: varlog
              mountPath: /var/log
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: otelcol-logs-min-config
        - name: varlog
          hostPath:
            path: /var/log
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otelcol-logs-min
  namespace: opamp-logs-poc
