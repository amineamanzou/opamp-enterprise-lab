apiVersion: apps/v1
kind: Deployment
metadata:
  name: otelcol-logs-gateway
  namespace: opamp-logs-poc
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: otelcol-logs-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otelcol-logs-gateway
    spec:
      containers:
        - name: otelcol
          image: REPLACE_WITH_OCB_OR_UPSTREAM_IMAGE
          args: ["--config=/etc/otelcol/collector.yaml"]
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: health
              containerPort: 13133
          env:
            - name: ELASTIC_OTLP_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: elastic-otlp
                  key: endpoint
            - name: ELASTIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: elastic-otlp
                  key: api-key
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
      volumes:
        - name: config
          configMap:
            name: otelcol-logs-gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: otelcol-logs-gateway
  namespace: opamp-logs-poc
spec:
  selector:
    app.kubernetes.io/name: otelcol-logs-gateway
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
    - name: health
      port: 13133
      targetPort: health
