---
- name: Install k3s server
  hosts: k3s_servers
  become: true
  vars:
    k3s_server_host: "{{ hostvars[groups['k3s_servers'][0]].ansible_host }}"
    k3s_server_url_host: "{{ '[' ~ k3s_server_host ~ ']' if ':' in k3s_server_host else k3s_server_host }}"
    k3s_server_url: "https://{{ k3s_server_url_host }}:6443"
  tasks:
    - name: Download k3s install script
      ansible.builtin.get_url:
        url: "{{ k3s_install_script_url }}"
        dest: /tmp/k3s-install.sh
        mode: "0755"

    - name: Install predownloaded k3s binary
      ansible.builtin.copy:
        src: "{{ k3s_binary_local_path }}"
        dest: "{{ k3s_binary_remote_path }}"
        owner: root
        group: root
        mode: "0755"

    - name: Check k3s server service
      ansible.builtin.stat:
        path: /etc/systemd/system/k3s.service
      register: k3s_server_service

    - name: Install k3s server
      ansible.builtin.command:
        cmd: /tmp/k3s-install.sh
      when: not k3s_server_service.stat.exists
      environment:
        INSTALL_K3S_VERSION: "{{ k3s_version }}"
        INSTALL_K3S_SKIP_DOWNLOAD: "true"
        INSTALL_K3S_EXEC: >-
          server
          --node-ip {{ ansible_host }}
          --advertise-address {{ ansible_host }}
          --tls-san {{ ansible_host }}
          --flannel-backend vxlan
          --cluster-cidr {{ k3s_cluster_cidr }}
          --service-cidr {{ k3s_service_cidr }}
          --write-kubeconfig-mode 0644
          --disable traefik

    - name: Wait for k3s server node readiness
      ansible.builtin.command: k3s kubectl get nodes
      register: k3s_server_nodes
      retries: 30
      delay: 5
      until: k3s_server_nodes.rc == 0
      changed_when: false

    - name: Read k3s node token
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_node_token_raw

    - name: Store k3s node token for worker play
      ansible.builtin.set_fact:
        k3s_node_token: "{{ k3s_node_token_raw.content | b64decode | trim }}"

    - name: Read k3s kubeconfig
      ansible.builtin.slurp:
        src: /etc/rancher/k3s/k3s.yaml
      register: k3s_kubeconfig_raw

    - name: Write local kubeconfig
      ansible.builtin.copy:
        dest: "{{ k3s_kubeconfig_local_path }}"
        mode: "0600"
        content: "{{ (k3s_kubeconfig_raw.content | b64decode) | replace('https://127.0.0.1:6443', k3s_server_url) | replace('https://[::1]:6443', k3s_server_url) }}"
      delegate_to: localhost
      become: false

- name: Install k3s workers
  hosts: k3s_workers
  become: true
  vars:
    k3s_server_host: "{{ hostvars[groups['k3s_servers'][0]].ansible_host }}"
    k3s_server_url_host: "{{ '[' ~ k3s_server_host ~ ']' if ':' in k3s_server_host else k3s_server_host }}"
    k3s_server_url: "https://{{ k3s_server_url_host }}:6443"
    k3s_node_token: "{{ hostvars[groups['k3s_servers'][0]].k3s_node_token }}"
  tasks:
    - name: Download k3s install script
      ansible.builtin.get_url:
        url: "{{ k3s_install_script_url }}"
        dest: /tmp/k3s-install.sh
        mode: "0755"

    - name: Install predownloaded k3s binary
      ansible.builtin.copy:
        src: "{{ k3s_binary_local_path }}"
        dest: "{{ k3s_binary_remote_path }}"
        owner: root
        group: root
        mode: "0755"

    - name: Check k3s agent service
      ansible.builtin.stat:
        path: /etc/systemd/system/k3s-agent.service
      register: k3s_agent_service

    - name: Install k3s worker
      ansible.builtin.command:
        cmd: /tmp/k3s-install.sh
      when: not k3s_agent_service.stat.exists
      environment:
        INSTALL_K3S_VERSION: "{{ k3s_version }}"
        INSTALL_K3S_SKIP_DOWNLOAD: "true"
        K3S_URL: "{{ k3s_server_url }}"
        K3S_TOKEN: "{{ k3s_node_token }}"
        INSTALL_K3S_EXEC: "agent --node-ip {{ ansible_host }}"

    - name: Wait for k3s agent service
      ansible.builtin.command: systemctl is-active k3s-agent
      register: k3s_agent_status
      retries: 30
      delay: 5
      until: k3s_agent_status.rc == 0
      changed_when: false
