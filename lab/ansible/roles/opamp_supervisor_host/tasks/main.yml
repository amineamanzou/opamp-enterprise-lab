---
- name: Check local OCB collector binary
  ansible.builtin.stat:
    path: "{{ ocb_collector_binary_local_path }}"
  delegate_to: localhost
  become: false
  register: ocb_collector_binary

- name: Require local OCB collector binary
  ansible.builtin.fail:
    msg: "Run task ocb:build before deploying the supervised collector."
  when: not ocb_collector_binary.stat.exists

- name: Check local opampsupervisor binary
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../../../lab/opamp-supervisor/bin/opampsupervisor"
  delegate_to: localhost
  become: false
  register: opampsupervisor_binary

- name: Require local opampsupervisor binary
  ansible.builtin.fail:
    msg: "Run task opamp:supervisor:build:linux before deploying the supervisor."
  when: not opampsupervisor_binary.stat.exists

- name: Check local collector environment file
  ansible.builtin.stat:
    path: "{{ collector_env_local_path }}"
  delegate_to: localhost
  become: false
  register: collector_env_file

- name: Require rendered collector environment file
  ansible.builtin.fail:
    msg: "Run task collector:env before deploying the supervisor."
  when: not collector_env_file.stat.exists

- name: Create collector config directory
  ansible.builtin.file:
    path: "{{ collector_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create collector log directory
  ansible.builtin.file:
    path: /var/log/opamp-poc
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create supervisor install directory
  ansible.builtin.file:
    path: "{{ collector_supervisor_bin | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create supervisor storage directory
  ansible.builtin.file:
    path: "{{ collector_supervisor_storage_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Install OCB collector binary
  ansible.builtin.copy:
    src: "{{ ocb_collector_binary_local_path }}"
    dest: "{{ ocb_collector_binary_remote_path }}"
    owner: root
    group: root
    mode: "0755"
  notify: Restart opampsupervisor-logs

- name: Install opampsupervisor binary
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../lab/opamp-supervisor/bin/opampsupervisor"
    dest: "{{ collector_supervisor_bin }}"
    owner: root
    group: root
    mode: "0755"
  notify: Restart opampsupervisor-logs

- name: Install supervised collector base config
  ansible.builtin.template:
    src: logs-supervised-elastic.yaml.j2
    dest: "{{ collector_supervised_config }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart opampsupervisor-logs

- name: Install opampsupervisor config
  ansible.builtin.template:
    src: supervisor.yaml.j2
    dest: "{{ collector_supervisor_config }}"
    owner: root
    group: root
    mode: "0640"
  notify: Restart opampsupervisor-logs

- name: Install collector environment file
  ansible.builtin.copy:
    src: "{{ collector_env_local_path }}"
    dest: "{{ collector_env_remote_path }}"
    owner: root
    group: root
    mode: "0600"
  notify: Restart opampsupervisor-logs

- name: Install opampsupervisor systemd unit
  ansible.builtin.template:
    src: opampsupervisor-logs.service.j2
    dest: "/etc/systemd/system/{{ collector_supervisor_service_name }}.service"
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart opampsupervisor-logs

- name: Stop direct collector service when present
  ansible.builtin.systemd:
    name: otelcol-logs-opamp
    enabled: false
    state: stopped
  failed_when: false

- name: Enable and start opampsupervisor
  ansible.builtin.systemd:
    name: "{{ collector_supervisor_service_name }}"
    enabled: true
    state: started
    daemon_reload: true

- name: Enable and start synthetic log generator
  ansible.builtin.systemd:
    name: synthetic-log-generator.service
    enabled: true
    state: started
