name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa-assets:
    name: QA assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install QA dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Markdown check
        run: bash scripts/qa/check-markdown.sh

      - name: Anonymization check
        run: bash scripts/qa/check-anonymization.sh

      - name: Source check
        run: bash scripts/qa/check-sources.sh

  task-ci:
    name: task ${{ matrix.task_name }}
    runs-on: ubuntu-latest
    needs: qa-assets
    strategy:
      fail-fast: false
      matrix:
        task_name:
          - study:check
          - opamp:test
          - ocb:build
          - infra:validate
          - ansible:lint
          - ci:local
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install QA dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.5'

      - name: Install OCB builder
        if: matrix.task_name == 'ocb:build' || matrix.task_name == 'ci:local'
        run: go install go.opentelemetry.io/collector/cmd/builder@v0.151.0

      - name: Install Task
        uses: go-task/setup-task@v2

      - name: Install ansible-lint
        if: matrix.task_name == 'ansible:lint' || matrix.task_name == 'ci:local'
        run: |
          python -m pip install --user ansible-lint
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run task
        run: task "${{ matrix.task_name }}"
